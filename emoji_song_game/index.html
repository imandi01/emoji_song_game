<!DOCTYPE html>
<html>
<head>
    <title>Guess The Song 🎵</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎵 Guess The Song From Emojis 🎵</h1>

    <div class="stats">
        <span>Score: <b id="score">0</b></span>
        <span>Streak: <b id="streak">0</b></span>
        <span>Time: <b id="timer">20</b>s</span>
    </div>

    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>

    <div id="emoji-display" class="emoji"></div>

    <input type="text" id="guess" placeholder="Type your guess..." />
    <button onclick="submitGuess()">Submit</button>
    <button onclick="showHint()">Hint (-2 pts)</button>

    <p id="message"></p>

    <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<script src="script.js"></script>
</body>
</html>
